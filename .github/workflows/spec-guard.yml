name: spec-guard

on:
  push:
  pull_request:

jobs:
  validate-templates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check lookahead rules
        run: python validators/lookahead_check.py

      - name: Check data-ready and parity rules
        run: python validators/data_ready_check.py
